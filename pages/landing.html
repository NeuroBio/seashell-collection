<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="Quick reference for my shell collection.">
		<meta name="author" content="Dr. Robinson" />
		<title>Shell Collection</title>

		<link href="../assets/css/shared.css" rel="stylesheet" />
		<link href="../assets/css/landing.css" rel="stylesheet" />
		<link rel="shortcut icon" type="image/x-icon" href="../favicon.ico">
	</head>
	<body>
		<header>
			<h1>Shell Collection</h1>

			<section id="main-controls">
				<section id="sort-by">
					<span id="sort-by-label">Sort By</span>
					<div id="toggle-container">
						<button
							id="sort-by-common"
							class="sort-toggle active-toggle"
							onClick="sortBy('common')"
							type="button">
							Common Name
						</button>
						<button
							id="sort-by-scientific"
							class="sort-toggle"
							onClick="sortBy('scientific')"
							type="button">
							Scientific Name
						</button>
					</div>
				</section>
				<button id="open-all" onClick="openAll()">Open All</button>

			</section>
		</header>

		<h2>Bivalves</h2>
		<section class="shell-listing-container" id="bivalves"></section>
		
		<h2>Univalves</h2>
		<section class="shell-listing-container" id="univalves"></section>


		<hr class="major-divider">
		<h2>Travelogue</h2>
		<ul id="travelogue"></ul>

		<script src="https://d3js.org/d3.v5.min.js"></script>
		<script src="../assets/data/shells.js"></script>
		<script src="../assets/data/travelogue.js"></script>
		<script src="../assets/scripts/landing.js"></script>
		<script src="../assets/scripts/magnifier.js"></script>
	</body>
</html>
